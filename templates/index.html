<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Job Matcher</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 0;
        color: white;
    }

    .container {
        width: 700px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        animation: fadeIn 0.8s ease;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #00ffe7;
    }

    textarea {
        width: 100%;
        height: 120px;
        border-radius: 12px;
        border: none;
        padding: 12px;
        font-size: 14px;
        outline: none;
        resize: none;
        margin-bottom: 15px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(90deg, #00ffe7, #00bcd4);
        color: black;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #00ffe7;
    }

    .results {
        margin-top: 20px;
        max-height: 400px;
        overflow-y: auto;
        padding-right: 5px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
        animation: slideUp 0.4s ease;
    }

    .card:hover {
        transform: translateY(-3px);
        background: rgba(255,255,255,0.15);
    }

    .job-text {
        flex: 1;
        font-size: 14px;
        line-height: 1.4;
        word-wrap: break-word;
    }

    .score {
        background: #00ffe7;
        color: black;
        padding: 6px 10px;
        border-radius: 8px;
        font-weight: bold;
        min-width: 60px;
        text-align: center;
    }

    /* scrollbar */
    .results::-webkit-scrollbar {
        width: 6px;
    }
    .results::-webkit-scrollbar-thumb {
        background: #00ffe7;
        border-radius: 10px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

</head>
<body>

<div class="container">
    <h2> Smart Job Matcher</h2>

    <form method="POST">
        <textarea name="resume" placeholder="Paste your resume here..."></textarea>
        <button type="submit">Match Jobs</button>
    </form>

    {% if results %}
    <div class="results">
        {% for job in results %}
        <div class="card">
            <div class="job-text">
                {{ job.job_description }}
            </div>
            <div class="score">
                {{ job.score }}
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}

</div>

</body>
</html>
